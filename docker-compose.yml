services:
  pickadate-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pickadate
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - pickadate-db-data:/var/lib/postgresql/data

